<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suryatokoku Apps</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f7f8ff;
}

/* HEADER */

.header{
    display:flex;
    align-items:center;
    padding:15px 20px 5px 20px;
}

.logo{
    width:55px;
    height:55px;
    object-fit:contain;
}

.brand{
    margin-left:12px;
}

.brand h2{
    font-size:24px;
    font-weight:800;

    background:linear-gradient(
        90deg,
        #ff4fa3,
        #7b61ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* SLOGAN */

.hero{
    padding:0 5px;
    margin-top:-8px;
    margin-bottom:5px;
}

.hero-img{
    width:100%;
    height:auto;
    display:block;
}

/* MENU */

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:12px;
    row-gap:2px;
    padding:0 20px 15px;
}

.card{
    background:#fff;
    border-radius:25px;
    padding:20px;
    text-align:center;
    text-decoration:none;
    color:#222;

    box-shadow:
    0 5px 15px rgba(0,0,0,.08);

    transition:.2s;
}

.card:active{
    transform:scale(.95);
}

.icon{
    font-size:36px;
    margin-bottom:10px;
}

.card h3{
    font-size:14px;
    line-height:1.4;
}

/* FOOTER */

.footer{
    text-align:center;
    font-size:12px;
    color:#999;
    margin-top:-25px;
    padding-bottom:25px;
}

/* MOBILE */

@media(max-width:480px){

    .logo{
        width:50px;
        height:50px;
    }

    .brand h2{
        font-size:22px;
    }

    .icon{
        font-size:32px;
    }

    .card h3{
        font-size:13px;
    }

}

.menu-btn{
    display:flex;
    align-items:center;
    justify-content:center;

    width:100%;
    height:auto;

    transition:.2s;
}

.menu-btn:active{
    transform:scale(.96);
}

.menu-img{
    width:100%;
    display:block;
}

/* BANNER BAWAH */

.bottom-banner{
    width:100%;
    margin-top:-35px;
}

.bottom-img{
    width:100%;
    height:auto;
    display:block;
}

.popup{
    display:none;
    position:fixed;
    inset:0;

    background:rgba(0,0,0,.5);

    justify-content:center;
    align-items:center;

    z-index:9999;
}

.popup-content{
    width:85%;
    max-width:320px;

    background:white;

    border-radius:25px;

    padding:25px;

    text-align:center;
}

.popup-icon{
    font-size:60px;
    margin-bottom:10px;
}

.popup-content h2{
    margin-bottom:10px;
}

.popup-content p{
    color:#666;
    line-height:1.5;
    margin-bottom:20px;
}

.popup-content button{

    border:none;

    background:#7b61ff;

    color:white;

    padding:12px 25px;

    border-radius:15px;

    cursor:pointer;
}
    
</style>

</head>
<body>

<!-- HEADER -->

<div class="header">

    <img src="Logo Surtok 3D.png" class="logo">

    <div class="brand">
        <h2>Suryatokoku</h2>
    </div>

</div>

<!-- SLOGAN -->

<div class="hero">
    <img src="Slogan.png" class="hero-img">
</div>

<!-- MENU -->

<div class="grid">

    <a href="https://suryatokoku.my.id/Pricetag/" class="menu-btn">
    <img src="Cek Harga.png" class="menu-img">
    </a>

    <a href="#" onclick="comingSoon()" class="menu-btn">
    <img src="Cetak Pricetag.png" class="menu-img">
    </a>

    <a href="https://suryatokoku.my.id/Hargacoretevent/" class="menu-btn">
    <img src="Cetak Harga Bundling.png" class="menu-img">
    </a>

    <a href="#" onclick="comingSoon()" class="menu-btn">
    <img src="Cetak Harga Turun.png" class="menu-img">
    </a>

    <a href="https://suryatokoku.my.id/Req-PO/" class="menu-btn">
    <img src="Request PO.png" class="menu-img">
    </a>

    <a href="https://suryatokoku.my.id/SO/" class="menu-btn">
     <img src="Stock Opname.png" class="menu-img">
    </a>
    
</div>

<!-- BANNER BAWAH -->

<div class="bottom-banner">
    <img src="Semangat kerja.png" class="bottom-img">
</div>

<!-- FOOTER -->

<div class="footer">
    © Suryatokoku
</div>

<div id="popup" class="popup">
    <div class="popup-content">

        <div class="popup-icon">🚀</div>

        <h2>Coming Soon</h2>

        <p>
            Fitur ini sedang dalam tahap pengembangan.
            Nantikan update berikutnya.
        </p>

        <button onclick="closePopup()">
            Oke
        </button>

    </div>
</div>

<script>

function comingSoon(){
    document.getElementById("popup").style.display="flex";
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

</script>
    
</body>
</html>
